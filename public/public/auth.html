<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Cabs | Premium Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), url('hero.png') no-repeat center center/cover;
            padding: 2rem;
        }

        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 4rem;
            border-radius: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg);
        }

        .auth-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding-bottom: 1rem;
        }

        .auth-tab {
            background: none;
            border: none;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--dark-charcoal);
            opacity: 0.4;
            transition: var(--transition);
        }

        .auth-tab.active {
            opacity: 1;
            color: var(--primary-red);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .auth-form .input-group {
            margin-bottom: 2rem;
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo" style="margin-bottom: 3rem; text-align: center;">
                <span class="logo-accent">Elite</span>Cabs
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuth('login')">Login</button>
                <button class="auth-tab" onclick="switchAuth('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-large">Login to Elite Access</button>
            </form>

            <!-- Register Form (Passenger Only) -->
            <form id="register-form" class="auth-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" placeholder="John Doe" required>
                </div>
                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" placeholder="name@example.com" required>
                </div>
                <div class="input-group">
                    <label>Phone Number</label>
                    <input type="tel" id="reg-phone" placeholder="+91 98765 43210" required>
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Create Elite Account</button>
            </form>

            <div class="auth-footer" style="text-align: left;">
                <a href="index.html" class="btn-back" title="Back to Home">←</a>
            </div>
        </div>
    </div>

    <script>
        function toggleDriverFields() {
            const role = document.getElementById('reg-role').value;
            const fields = document.getElementById('driver-fields');
            fields.style.display = role === 'driver' ? 'block' : 'none';
        }

        function switchAuth(type) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));

            if (type === 'login') {
                document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                email: document.getElementById('login-email').value,
                password: document.getElementById('login-password').value
            };

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    // This is only for travelers/passengers
                    localStorage.setItem('elite_member', JSON.stringify(result.user));
                    window.location.href = 'index.html';
                } else {
                    alert(result.error);
                }
            } catch (err) { alert('Login failed'); }
        });

        // Handle Register
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('reg-name').value,
                email: document.getElementById('reg-email').value,
                phone: document.getElementById('reg-phone').value,
                password: document.getElementById('reg-password').value,
                role: 'user' // Hardcoded to passenger
            };

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (res.ok) {
                    alert('Registration successful! Please login to your Elite Traveler account.');
                    switchAuth('login');
                } else {
                    alert(result.error);
                }
            } catch (err) { alert('Registration failed'); }
        });
    </script>
    <script src="alert.js"></script>
</body>

</html>
