<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Terminal | Elite Cabs</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body style="background: #FAFBFC; padding: 4rem 0;">
    <div class="container" style="max-width: 800px;">
        <header class="driver-header">
            <div class="driver-info">
                <h2>Captain Rajesh</h2>
                <p>ID: #DR-8822 | SUV Expert</p>
            </div>
            <button class="btn btn-primary" style="background: #2ed573; border: none;">Go Offline</button>
        </header>

        <h3 style="margin-bottom: 2.5rem; font-weight: 800; font-size: 1.75rem;">Incoming Requests</h3>

        <div id="job-list">
            <!-- Jobs will be loaded dynamically -->
        </div>
    </div>

    <script>
        async function loadJobs() {
            try {
                const response = await fetch('/api/driver/jobs');
                const jobs = await response.json();
                const jobList = document.getElementById('job-list');

                if (jobs.length > 0) {
                    jobList.innerHTML = '';
                    jobs.forEach(job => {
                        const div = document.createElement('div');
                        div.className = 'job-card';
                        div.innerHTML = `
                            <div style="display: flex; justify-content: space-between; margin-bottom: 2rem; align-items: flex-start;">
                                <span class="badge badge-warning">New Request</span>
                                <div style="text-align: right;">
                                    <span style="display: block; font-weight: 800; color: var(--primary-red); font-size: 1.5rem;">${job.fare}</span>
                                    <span style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700;">Est. Fare</span>
                                </div>
                            </div>
                            
                            <div style="margin-bottom: 2.5rem; border-left: 2px solid var(--accents); padding-left: 1.5rem; margin-left: 0.5rem;">
                                <div style="position: relative; margin-bottom: 1.5rem;">
                                    <div style="font-weight: 700; color: var(--dark-charcoal); font-size: 1.15rem;">${job.pickup_loc}</div>
                                    <div style="font-size: 0.85rem; color: var(--text-muted);">Pickup Point</div>
                                </div>
                                <div style="position: relative;">
                                    <div style="font-weight: 700; color: var(--dark-charcoal); font-size: 1.15rem;">${job.drop_loc}</div>
                                    <div style="font-size: 0.85rem; color: var(--text-muted);">Destination</div>
                                </div>
                            </div>

                            <div style="display: flex; gap: 1rem; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding: 1rem; background: #f8fafc; border-radius: 12px;">
                                <div style="font-size: 0.9rem; font-weight: 600;">👥 ${job.passengers} Passengers</div>
                                <div style="font-size: 0.9rem; font-weight: 600;">⏰ ${job.pickup_time}</div>
                            </div>

                            <div style="display: flex; gap: 1rem;">
                                <button class="btn btn-primary" style="flex: 2;" onclick="acceptJob(${job.id})">Accept Premium Ride</button>
                                <button class="btn" style="flex: 1; border: 1px solid var(--accents); background: white; color: var(--text-muted);">Decline</button>
                            </div>
                        `;
                        jobList.appendChild(div);
                    });
                } else {
                    jobList.innerHTML = '<p style="text-align: center; opacity: 0.5; padding: 5rem; font-size: 1.1rem;">No pending requests at the moment. Safe driving!</p>';
                }
            } catch (err) {
                console.error('Error loading jobs:', err);
            }
        }

        async function acceptJob(id) {
            if (!confirm("Confirm acceptance of this ride?")) return;

            try {
                const response = await fetch('/api/bookings/update-status', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bookingId: id, status: 'assigned' })
                });

                if (response.ok) {
                    alert("Ride accepted! Proceed to pickup.");
                    loadJobs();
                }
            } catch (err) {
                console.error('Error accepting job:', err);
            }
        }

        loadJobs();
        // Refresh every 15 seconds
        setInterval(loadJobs, 15000);
    </script>
</body>

</html>
